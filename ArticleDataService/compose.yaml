services:
  mongodb:
    image: mongodb/mongodb-community-server:8.0.21-ubi8-slim
    container_name: articles_mongodb
    restart: always
    ports:
      - "9003:27017"
    environment:
      MONGO_DB: ${MONGO_DB}
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASS}
      MONGO_USER: ${MONGO_USER}
      MONGO_USER_PASS: ${MONGO_USER_PASS}
    volumes:
      - mongodb_data:/data/db
      - ./mongo-init.sh:/docker-entrypoint-initdb.d/mongo-init.sh:ro
    networks:
      - gazella-net
  
  article-data-service:
    image: article-data-service
    build:
      context: .
      dockerfile: Dockerfile
    container_name: articles_data_service
    ports:
      - "6000:8080"
      - "6001:8081"
    networks:
      - gazella-net
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__MongoDb=mongodb://${MONGO_USER}:${MONGO_USER_PASS}@mongodb:27017/${MONGO_DB}
      - MongoDbName=${MONGO_DB}
    depends_on:
      - mongodb

volumes:
  mongodb_data:

networks:
  gazella-net:
    external: true
