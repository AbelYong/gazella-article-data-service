syntax = "proto3";

option csharp_namespace = "ArticleService.Protos.Article";

package article;

service ArticleService {
  rpc GetCategories (GetCategoriesRequest) returns (GetCategoriesResponse);
  rpc GetMyArticles (GetMyArticlesRequest) returns (GetMyArticlesResponse);
  rpc GetArticle (GetArticleRequest) returns (GetArticleResponse);
  rpc SearchArticles (SearchArticlesRequest) returns (SearchArticlesResponse);
  rpc GetPublishedArticles (GetPublishedArticlesRequest) returns (GetPublishedArticlesResponse);
  rpc DeleteArticle (DeleteArticleRequest) returns (DeleteArticleResponse);
  rpc GetAuthorStats (GetAuthorStatsRequest) returns (GetAuthorStatsResponse);
  rpc GetFeaturedArticles (GetFeaturedArticlesRequest) returns (GetFeaturedArticlesResponse);
}

message GetCategoriesRequest { }

message Category {
  string id = 1;
  string name = 2;
}

message GetCategoriesResponse {
  repeated Category categories = 1;
}

message MyArticle {
  string article_id = 1;
  string title = 2;
  string status = 3;
  string category = 4;
  string published_at = 5;
  int32 likes = 6;
  int32 comments = 7;
}

message GetMyArticlesRequest {
  string id = 1;
}

message GetMyArticlesResponse {
  repeated MyArticle my_articles = 1;
}

message RecentComment {
  string id = 1;
  string author_id = 2;
  string author_name = 3;
  string author_pfp_uri = 4;
  string content = 5;
  string posted_at = 6;
}

message GetArticleRequest {
  string id = 1;
}

message GetArticleResponse {
  string id = 1;
  string title = 2;
  string cover_uri = 3;
  string summary = 4;
  string category = 5;
  string published_at = 6;
  string last_updated_at = 7;
  string status = 8;
  string content = 9;
  string author_id = 10;
  string author_name = 11;
  string author_pfp_uri = 12;
  int32 likes_count = 13;
  int32 comments_count = 14;
  repeated RecentComment recent_comments = 15;
}

message SearchFilter {
  string title = 1;
  string category = 2;
  string author_name = 3;
  string published_after = 4;
  string sort_by = 5;
}

message SearchArticlesRequest {
  SearchFilter filter = 1;
  int32 page_index = 2;
  int32 page_size = 3;
}

message ArticleEntry {
  string id = 1;
  string title = 2;
  string author_id = 3;
  string author_name = 4;
  string category_name = 5;
  string summary = 6;
  string published_at = 7;
  string last_updated_at = 8;
}

message SearchArticlesResponse {
  repeated ArticleEntry entries = 1;
  int32 total_entries = 2;
  int32 current_page = 3;
  int32 page_count = 4;
  int32 page_size = 5;
}

message PublishedArticle {
  string id = 1;
  string title = 2;
  string author_name = 3;
  string published_at = 4;
  int32 likes_count = 5;
  int32 comments_count = 6;
  string status = 7;
}

message GetPublishedArticlesRequest {
  int32 page_index = 1;
  int32 page_size = 2;
}

message GetPublishedArticlesResponse {
  repeated PublishedArticle published_articles = 1;
  int32 total_entries = 2;
  int32 current_page = 3;
  int32 page_count = 4;
  int32 page_size = 5;
}

message DeleteArticleRequest {
  string article_id = 1;
}

message DeleteArticleResponse {
  string status = 1;
  string message = 2;
}

message GetAuthorStatsRequest {
  string author_id = 1;
}

message TopAuthorArticle {
  string id = 1;
  string title = 2;
  int32 likes_count = 3;
  int32 comments_count = 4;
}

message RecentActivity {
  string latest_comment_id = 1;
  string latest_comment_article_id = 2;
  string latest_comment_posted_at = 3;
  int32 likes_today = 4;
}

message GetAuthorStatsResponse {
  repeated TopAuthorArticle top_articles = 1;
  RecentActivity recent_activity = 2;
  int32 total_likes = 3;
  int32 total_comments = 4;
  int32 published_articles_count = 5;
  float engagement_rate = 6;
}

message GetFeaturedArticlesRequest {
  int32 requested_amount = 1;
}

message FeaturedArticle {
  string id = 1;
  string title = 2;
  string cover_uri = 3;
  string author_id = 4;
  string author_name = 6;
  string author_pfp_uri = 7;
  string summary = 8;
}

message GetFeaturedArticlesResponse {
  repeated FeaturedArticle featured_articles = 1;
}
