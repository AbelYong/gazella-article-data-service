syntax = "proto3";

option csharp_namespace = "ArticleService.Protos.Interaction";

package interaction;

service InteractionService {
  rpc CommentArticle (CommentArticleRequest) returns (CommentArticleResponse);
  rpc DeleteComment (DeleteCommentRequest) returns (DeleteCommentResponse);
  rpc GetComments (GetCommentsRequest) returns (GetCommentsResponse);
  rpc LikeArticle (LikeArticleRequest) returns (LikeArticleResponse);
  rpc RevokeLike (RevokeLikeRequest) returns (RevokeLikeResponse);
}

message CommentArticleRequest {
  string article_id = 1;
  string author_id = 2;
  string author_name = 3;
  string author_pfp_uri = 4;
  string content = 5;
}

message CommentArticleResponse {
  bool success = 1;
  string posted_at = 2;
}

message DeleteCommentRequest {
  string article_id = 1;
  string comment_id = 2;
}

message DeleteCommentResponse {
  bool success = 1;
  string message = 2;
}

message GetCommentsRequest {
  string article_id = 1;
  int32 page_index = 2;
  int32 page_size = 3;
}

message Comment {
  string id = 1;
  string author_id = 2;
  string author_name = 3;
  string author_pfp_uri = 4;
  string content = 5;
  string posted_at = 6;
}

message GetCommentsResponse {
  repeated Comment comments = 1;
  int32 total_comments = 2;
  int32 current_page = 3;
  int32 page_count = 4;
  int32 page_size = 5;
}

message LikeArticleRequest {
  string article_id = 1;
  string author_id = 2;
}

message LikeArticleResponse {
  string message = 1;
  int32 current_likes = 2;
}

message RevokeLikeRequest {
  string article_id = 1;
  string author_id = 2;
}

message RevokeLikeResponse {
  string message = 1;
  int32 current_likes = 2;
}
